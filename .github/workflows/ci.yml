name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: "PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.4", "8.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
